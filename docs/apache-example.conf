# seobuline.kro.kr Apache reverse proxy example
# SSL termination: Apache(443) -> Next.js app(127.0.0.1:5050)
# Requires: a2enmod proxy proxy_http headers rewrite ssl

<VirtualHost *:80>
  ServerName seobuline.kro.kr
  RewriteEngine On
  RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
  ServerName seobuline.kro.kr

  SSLEngine On
  SSLCertificateFile /etc/letsencrypt/live/seobuline.kro.kr/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/seobuline.kro.kr/privkey.pem

  ProxyPreserveHost On
  ProxyRequests Off

  # Important for app-side redirect/cookie behavior behind reverse proxy
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"
  RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"

  ProxyPass / http://127.0.0.1:5050/
  ProxyPassReverse / http://127.0.0.1:5050/
</VirtualHost>
